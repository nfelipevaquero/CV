<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CV_Nicolas_Felipe.doc - Microsoft Word</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">Curriculum_Vitae_Nicolas.doc - Microsoft Word</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        
        <div class="menu-bar">
            <span><u>A</u>rchivo</span><span><u>E</u>dición</span><span><u>V</u>er</span><span><u>I</u>nsertar</span><span><u>F</u>ormato</span><span><u>H</u>erramientas</span>
        </div>

        <div class="toolbar-container">
            <div class="toolbar">
                <div class="button-group"><span>💾</span><span>🖨️</span></div>
                <div class="separator"></div>
                <select><option>Times New Roman</option></select>
                <select><option>12</option></select>
                <div class="button-group"><b>N</b> <i>K</i> <u>S</u></div>
            </div>
            <div class="ruler"></div>
        </div>

        <div class="window-body" id="scroll-container">
            <div class="paper">
                <div id="cv-content"></div>
                <span class="cursor">|</span>
            </div>
        </div>

        <div class="status-bar">
            <p>Pág 1 Secc 1</p>
            <p class="status-right"><b>ESPAÑOL</b></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
